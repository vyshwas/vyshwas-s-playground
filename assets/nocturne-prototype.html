  :root{
    --night:#0A0D14;
    --app-bg:#0E1220;
    --surface:#161B2C;
    --line:#262D42;
    --ink-hi:#EDEFF7;
    --ink-lo:#8B93AB;
    --amber:#E8A33D;
    --amber-deep:#B87A1E;
    --paper:#F4EFE6;
    --paper-shade:#E9E2D4;
    --ink-print:#2B2A26;
    --ink-faint:#8A857A;
    --stamp-green:#1E6B45;
    --fail:#C24A33;
    --mono:'IBM Plex Mono',ui-monospace,"Cascadia Mono",Consolas,monospace;
    --sans:'Outfit','IBM Plex Mono',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --serif:'Fraunces','IBM Plex Mono',Georgia,"Times New Roman",serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  .nx-page{
    min-height:100vh;
    background:var(--night);
    background-image:radial-gradient(ellipse 720px 420px at 50% -60px, #141a26 0%, rgba(20,26,38,0) 70%);
    color:var(--ink-hi);
    font-family:var(--sans);
    display:flex;flex-direction:column;align-items:center;
    padding:36px 16px 40px;
    overflow-x:hidden;
    position:relative;
  }
  .nx-stars{position:absolute;inset:0;pointer-events:none}
  .nx-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#EDEFF7;opacity:.3}
  .nx-stars i:nth-child(1){top:64px;left:18%}
  .nx-stars i:nth-child(2){top:130px;left:76%}
  .nx-stars i:nth-child(3){top:210px;left:33%;opacity:.2}

  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  button:disabled{cursor:default}
  :focus{outline:none}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:6px}

  /* ---------- inline icon system (Phosphor) ---------- */
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;fill:currentColor;flex:none}
  .ic-lg{width:1.15em;height:1.15em;vertical-align:-0.22em}
  .veg{flex:none;width:13px;height:13px;border:1.5px solid currentColor;border-radius:3px;display:inline-flex;align-items:center;justify-content:center}
  .veg::after{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .veg.nonveg{color:#C24A33}
  .veg.veg-ok{color:#3E9E63}

  /* ---------- page header / footer ---------- */
  .nx-head{text-align:center;margin-bottom:20px;position:relative;z-index:1}
  .nx-wordmark{font-family:var(--serif);font-style:italic;font-size:28px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:8px}
  .nx-wordmark svg{width:16px;height:16px;fill:var(--amber);transform:translateY(1px)}
  .nx-sub{margin-top:6px;font-size:13px;color:var(--ink-lo)}
  .nx-footnote{margin-top:18px;font-size:11px;color:#5a6178;text-align:center}

  /* ---------- phone frame ---------- */
  .nx-phone{
    width:min(390px,100%);height:800px;flex:none;
    border:1px solid #2a3040;border-radius:54px;
    background:var(--app-bg);
    box-shadow:0 0 0 6px rgba(20,26,38,.55), 0 0 60px rgba(232,163,61,.06), 0 30px 80px rgba(0,0,0,.55);
    position:relative;overflow:hidden;
    z-index:1;
  }
  .nx-app{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}

  /* status bar */
  .st-bar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:16px 26px 6px;color:var(--ink-lo);font-size:12px;font-weight:600;letter-spacing:.02em}
  .st-glyphs{display:flex;align-items:center;gap:6px}
  .st-glyphs svg{display:block;fill:var(--ink-lo)}

  /* ---------- storefront ---------- */
  .store{flex:1;display:flex;flex-direction:column;min-height:0}
  .store-scroll{flex:1;overflow-y:auto;min-height:0;padding:4px 16px 96px;scrollbar-width:none}
  .store-scroll::-webkit-scrollbar{display:none}
  .app-head{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 10px}
  .app-brand{font-family:var(--serif);font-style:italic;font-size:19px;display:flex;align-items:center;gap:6px}
  .app-brand svg{width:13px;height:13px;fill:var(--amber)}
  .loc-row{display:flex;align-items:center;gap:8px;padding:0 2px 12px}
  .loc-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:12px;color:var(--ink-hi)}
  .eta-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(232,163,61,.14);border:1px solid rgba(232,163,61,.35);color:var(--amber);border-radius:999px;padding:7px 11px;font-size:12px;font-weight:700}
  .search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:11px 14px;font-size:13px;color:var(--ink-lo);margin-bottom:18px}
  .sec-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin:2px 2px 10px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
  .card-tile{height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
    background:radial-gradient(125% 120% at 50% -10%,color-mix(in srgb,var(--tint,#8B93AB) 30%,var(--surface)) 0%,var(--surface) 72%)}
  .card-tile .ic{width:42px;height:42px;color:var(--tint,#B7C0D8);opacity:.95}
  .card-body{padding:9px 10px 10px;display:flex;flex-direction:column;gap:2px;flex:1}
  .card-name{font-size:12.5px;font-weight:600;line-height:1.25;display:flex;align-items:flex-start;gap:6px}
  .card-name .veg{margin-top:2px}
  .card-wt{font-size:11px;color:var(--ink-lo)}
  .card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
  .card-price{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
  .btn-add{min-width:58px;min-height:30px;padding:4px 12px;border:1px solid rgba(232,163,61,.55);color:var(--amber);border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.08em}
  .btn-add:hover{background:rgba(232,163,61,.12)}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--amber);border-radius:999px;background:rgba(232,163,61,.12);overflow:hidden}
  .stepper button{width:28px;height:30px;color:var(--amber);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .stepper button:hover{background:rgba(232,163,61,.16)}
  .stepper .q{min-width:20px;text-align:center;font-size:12.5px;font-weight:700;color:var(--amber);font-variant-numeric:tabular-nums}

  .cart-bar{
    position:absolute;left:14px;right:14px;bottom:16px;z-index:3;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:#1A2033;border:1px solid var(--line);border-radius:16px;
    padding:10px 10px 10px 16px;box-shadow:0 12px 30px rgba(0,0,0,.5);
  }
  .cart-bar.hide{display:none}
  .cart-meta{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}

  function assign(t, s) { for (var k in s) { if (Object.prototype.hasOwnProperty.call(s, k)) { t[k] = s[k]; } } return t; }
  function after(fn, ms) { timers.push({ kind: "t", id: setTimeout(fn, ms) }); }
  function every(fn, ms) { timers.push({ kind: "i", id: setInterval(fn, ms) }); }
  function clearTimers() {
    timers.forEach(function (x) { if (x.kind === "t") { clearTimeout(x.id); } else { clearInterval(x.id); } });
    timers = [];
  }
  function $(sel) { return document.querySelector(sel); }
  function esc(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function vegMark(v) {
    if (v === null || v === undefined) { return ""; }
    return '<span class="veg ' + (v ? "veg-ok" : "nonveg") + '" role="img" aria-label="' + (v ? "Vegetarian" : "Non-vegetarian") + '"></span>';
  }

  /* ---------- derived money (never hardcode totals) ---------- */
  function qty(id) { return S.cart[id] || 0; }
  function cartItems() { return PRODUCTS.filter(function (p) { return qty(p.id) > 0; }); }
  function itemCount() { return cartItems().length; } /* distinct line items — spec: "4 items · ₹254" */
  function itemTotal() { return cartItems().reduce(function (n, p) { return n + p.price * qty(p.id); }, 0); }
  function toPay() { return itemTotal() + HANDLING; }
  function ru(n) { return "₹" + n; }

    for (var i = 0; i < METHODS.length; i++) { if (METHODS[i].id === S.method) { return METHODS[i]; } }
    return METHODS[0];

  function etaClock() {
    var m = BASE_MIN + addr().eta;
    var h = Math.floor(m / 60) % 12; if (h === 0) { h = 12; }
    var mm = m % 60;
    return h + ":" + (mm < 10 ? "0" + mm : mm) + " AM";
  }

  /* ---------- state machine ---------- */
  function setState(next, opts) {
    opts = opts || {};
    clearTimers();
    var prev = S.state;
    S.state = next;
    S.addrSheet = false;
    S.methodSheet = !!opts.methodSheet;

    if (next === "skeleton") {
      after(function () { if (S.state === "skeleton") { setState("order"); } }, RM ? 150 : 950);
    }
    if (next === "processing") {
      S.secs = 45;
      every(function () {
        S.secs = Math.max(0, S.secs - 1);
        var n = $("#ringNum"); if (n) { n.textContent = S.secs; }
      }, 1000);
      after(function () {
        if (S.state !== "processing") { return; }
        setState(S.simulate === "fail" ? "misprint" : "success");
      }, RM ? 1200 : 2600);
    }
    if (next === "misprint") {
      /* auto-flip so retry completes the story; user can flip back */
      S.simulate = "succeed";
    }
    if (next === "success") {
      lastPaidMethod = method();
    }

    render(prev);

    if (next === "misprint" && !RM) {
      var d = $("#drawer");
      d.classList.remove("shake");
      void d.offsetWidth;
      d.classList.add("shake");
      after(function () { d.classList.remove("shake"); }, 300);
    }
    announce(next);
  }

      success: "Order placed. Arriving by " + etaClock()

    $("#liveStatus").textContent = msg;

    return '<section id="secDone" class="print">' +
      '<hr class="dot-rule">' +
      '<div class="addr-line" style="font-size:11px">DELIVER TO · ' + esc(addr().name) + ", " + esc(addr().strip.split(", ")[1]) + "</div>" +
      '<div class="paid-line" style="margin-top:6px">' + paid + "</div>" +
      mrow("Order ID", "NOC-58291") +
      '<div class="r-fine" style="text-align:center;margin-top:10px">Thank you. Sleep easy.</div>' +
      "</section>";
  }

  /* ---------- renderers ---------- */
  function renderStore() {
    var grid = $("#grid");
    grid.innerHTML = PRODUCTS.map(function (p) {
      var q = qty(p.id);
      var footBtn = q > 0
        ? '<span class="stepper"><button type="button" data-act="dec" data-id="' + p.id + '" aria-label="Remove one ' + esc(p.name) + '">−</button>' +
          '<span class="q">' + q + "</span>" +
          '<button type="button" data-act="inc" data-id="' + p.id + '" aria-label="Add one ' + esc(p.name) + '">+</button></span>'
        : '<button type="button" class="btn-add" data-act="add" data-id="' + p.id + '" aria-label="Add ' + esc(p.name) + '">ADD</button>';
      return '<div class="card"><div class="card-tile" style="--tint:' + p.tint + '" aria-hidden="true">' + ico(IC[p.id]) + "</div>" +
        '<div class="card-body"><div class="card-name">' + vegMark(p.veg) + "<span>" + esc(p.name) + "</span></div>" +
        '<div class="card-wt">' + esc(p.wt) + "</div>" +
        '<div class="card-foot"><span class="card-price">' + ru(p.price) + "</span>" + footBtn + "</div></div></div>";
    }).join("");

    var bar = $("#cartBar");
    if (itemCount() === 0) {
      bar.classList.add("hide");
      bar.innerHTML = "";
    } else {
      bar.classList.remove("hide");
      bar.innerHTML = '<div class="cart-meta">' + itemCount() + " item" + (itemCount() === 1 ? "" : "s") +
        " · " + ru(itemTotal()) + "<small>Free delivery, no night fee</small></div>" +
        '<button type="button" class="btn-amber" data-act="checkout">Checkout →</button>';
    }
  }

  function stageOf(st) {
    if (st === "order" || st === "skeleton") { return 1; }
    if (st === "address") { return 2; }
    if (st === "pay" || st === "processing" || st === "misprint") { return 3; }
    if (st === "success") { return 4; }
    return 0;
  }

  function renderChips() {
    var cur = stageOf(S.state);
    var names = ["Order", "Address", "Pay"];
    $("#stageChips").innerHTML = names.map(function (nm, i) {
      var n = i + 1;
      var cls = n < cur ? "done" : (n === cur ? "cur" : "");
      var mark = n < cur ? "✓" : n;
      return '<span class="schip ' + cls + '"><span class="n">' + mark + "</span>" + nm + "</span>";
    }).join("");
  }

  function renderPaper(prev) {
    var paper = $("#paper");
    var wrap = $("#paperWrap");
    var frag = $("#frag");
    var perfBot = $("#perfBot");
    var st = S.state;
    var prevStage = stageOf(prev);

    wrap.classList.remove("shrink", "settle");
    paper.classList.remove("torn");
    frag.hidden = true;
    frag.innerHTML = "";
    perfBot.hidden = true;

    var html = receiptHead();
    if (st === "skeleton") {
      html += skeletonHTML();
    } else if (st === "order") {
      html += orderFull(prev === "skeleton" || prevStage === 0);
    } else if (st === "address") {
      html += orderSummary() + addressFull(prevStage <= 1);
    } else if (st === "pay") {
      html += orderSummary() + addressSummary() + payFull(prevStage <= 2 || prev === "misprint", false);
    } else if (st === "processing") {
      html += orderSummary() + addressSummary() + payFull(false, true);
    } else if (st === "misprint") {
      html += orderSummary() + addressSummary() + payTornStub();
      wrap.classList.add("shrink");
      paper.classList.add("torn");
      frag.hidden = false;
      frag.innerHTML = fragHTML();
    } else if (st === "success") {
      html += orderFull(false, true) + successExtras();
      wrap.classList.add("shrink");
      if (!RM) { wrap.classList.add("settle"); }
      perfBot.hidden = false;
    }
    paper.innerHTML = html;
  }

  function ringHTML() {
    var C = 2 * Math.PI * 10; /* r=10 */
    return '<span class="ring-wrap" aria-hidden="true">' +
      '<svg width="26" height="26" viewBox="0 0 26 26">' +
      '<circle cx="13" cy="13" r="10" fill="none" stroke="#262D42" stroke-width="2.5"></circle>' +
      '<circle id="ringArc" cx="13" cy="13" r="10" fill="none" stroke="#E8A33D" stroke-width="2.5" stroke-linecap="round" ' +
      'stroke-dasharray="' + C.toFixed(2) + '" stroke-dashoffset="0" style="transition:stroke-dashoffset 45s linear"></circle>' +
      '</svg><span class="num" id="ringNum">' + S.secs + "</span></span>";
  }

  function ctxStrip() {
    return '<div class="ctx-strip"><b>' + ru(itemTotal()) + "</b> · " + esc(addr().strip) +
      ' · <span class="zap">' + ico(IC.bolt) + "</span> <b>" + addr().eta + " min</b></div>";
  }

  function renderFooter() {
    var f = $("#ctxFooter");
    var st = S.state;
    var m = method();
    if (st === "skeleton") {
      f.innerHTML = ctxStrip() + '<button type="button" class="cta" disabled>Printing your order…</button>';
    } else if (st === "order") {
      f.innerHTML = ctxStrip() + '<button type="button" class="cta" data-act="cta">Confirm order · ' + ru(toPay()) + "</button>";
    } else if (st === "address") {
      f.innerHTML = ctxStrip() + '<button type="button" class="cta" data-act="cta">Confirm address</button>';
    } else if (st === "pay") {
      f.innerHTML = ctxStrip() + '<button type="button" class="cta" data-act="cta">Pay ' + ru(toPay()) + "</button>";
    } else if (st === "processing") {
      var waitTxt = m.upi ? "Waiting for approval in " + esc(m.name.replace(" UPI", "")) + "…" : "Confirming your order…";
      f.innerHTML = ctxStrip() + '<button type="button" class="cta processing" disabled>' + ringHTML() + "<span>" + waitTxt + "</span></button>";
      startRing();
    } else if (st === "misprint") {
      f.innerHTML = ctxStrip() +
        '<button type="button" class="cta" data-act="cta">Try again · Pay ' + ru(toPay()) + "</button>" +
        '<button type="button" class="link-under" data-act="use-different">Use a different app</button>';
    } else if (st === "success") {
      f.innerHTML = '<div class="arrive-line">Arriving by ' + etaClock() + " <span>· Rahul is on the way</span></div>" +
        '<div class="dp-card">' +
          '<span class="dp-av" aria-hidden="true">R</span>' +
          '<span class="dp-info"><b>Rahul K.</b><small>Your delivery partner · 4.9 rating</small></span>' +
          '<span class="dp-actions">' +
            '<button type="button" class="dp-btn" data-act="call-rider" aria-label="Call Rahul">' + ico(IC.phone) + "</button>" +
            '<button type="button" class="dp-btn" data-act="chat-rider" aria-label="Message Rahul">' + ico(IC.chat) + "</button>" +
          "</span>" +
        "</div>" +
        '<button type="button" class="cta-quiet" data-act="track">Track order</button>' +
        '<button type="button" class="link-under" data-act="back-store">Back to store</button>';
    } else {
      f.innerHTML = "";
    }
  }

  function startRing() {
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        var arc = $("#ringArc");
        if (arc) { arc.style.strokeDashoffset = (2 * Math.PI * 10).toFixed(2); }
      });
    });
  }

  function renderControls() {
    $("#simOk").setAttribute("aria-pressed", String(S.simulate === "succeed"));
    $("#simFail").setAttribute("aria-pressed", String(S.simulate === "fail"));
    var map = { store: "store", skeleton: "order", order: "order", address: "address", pay: "pay", processing: "processing", misprint: "misprint", success: "success" };
    var cur = map[S.state];
    var chips = document.querySelectorAll("#jumpRow .jchip");
    for (var i = 0; i < chips.length; i++) {
      chips[i].classList.toggle("cur", chips[i].getAttribute("data-id") === cur);
    }
  }

  function render(prev) {
    var open = S.state !== "store";
    $("#scrim").classList.toggle("on", open);
    $("#drawer").classList.toggle("open", open);
    renderStore();
    renderControls();
    if (open) {
      renderChips();
      renderPaper(prev);
      renderFooter();
      if (stageOf(prev) !== stageOf(S.state)) {
        var sc = $("#drawerScroll");
        sc.scrollTop = sc.scrollHeight;
      }
    }
  }

  /* ---------- events ---------- */
  document.addEventListener("click", function (e) {
    var el = e.target.closest ? e.target.closest("[data-act]") : null;
    if (!el) { return; }
    var act = el.getAttribute("data-act");
    var id = el.getAttribute("data-id");
    var focusKey = act + "|" + (id || "");

    switch (act) {
      case "add":
        S.cart[id] = 1; renderStore(); restoreFocus("inc|" + id); break;
      case "inc":
        S.cart[id] = qty(id) + 1; renderStore(); restoreFocus(focusKey); break;
      case "dec":
        if (qty(id) <= 1) { delete S.cart[id]; } else { S.cart[id] = qty(id) - 1; }
        renderStore(); restoreFocus(qty(id) > 0 ? focusKey : "add|" + id); break;
      case "checkout":
        setState("skeleton"); break;
      case "close-drawer":
        if (S.state !== "store") { setState("store"); } break;
      case "jump":
        if (id === "store") { setState("store"); }
        else {
          if (itemCount() === 0) { S.cart = assign({}, SEED); }
          setState(id);
        }
        break;
      case "sim":
        S.simulate = id; renderControls(); break;
      case "edit-order":
        setState("order"); break;
      case "edit-address":
        setState("address"); break;
      case "addr-sheet":
        S.addrSheet = !S.addrSheet; renderPaper(S.state); restoreFocus(focusKey); break;
      case "addr-pick":
        S.addr = id; S.addrSheet = false;
        renderPaper(S.state); renderFooter(); restoreFocus("addr-sheet|");
        break;
      case "door":
        S.door = !S.door; renderPaper(S.state); restoreFocus(focusKey); break;
      case "method-sheet":
        S.methodSheet = !S.methodSheet; renderPaper(S.state); restoreFocus(focusKey); break;
      case "method-pick":
        S.method = id; S.methodSheet = false;
        renderPaper(S.state); renderFooter(); restoreFocus("method-sheet|");
        break;
      case "cta":
        if (S.state === "order") { setState("address"); }
        else if (S.state === "address") { setState("pay"); }
        else if (S.state === "pay") { setState("processing"); }
        else if (S.state === "misprint") { setState("pay"); }
        break;
      case "use-different":
        setState("pay", { methodSheet: true }); break;
      case "back-store":
        resetAll(); setState("store"); break;
      case "track":
        /* decorative — prototype ends here */ break;
    }
  });

  function restoreFocus(key) {
    var parts = key.split("|");
    var sel = '[data-act="' + parts[0] + '"]' + (parts[1] ? '[data-id="' + parts[1] + '"]' : "");
    var el = document.querySelector(sel);
    if (el) { el.focus(); }
  }

  /* Escape closes the drawer */
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && S.state !== "store") { setState("store"); }
  });

  /* ---------- boot ---------- */
  render("store");
})();
</script>
